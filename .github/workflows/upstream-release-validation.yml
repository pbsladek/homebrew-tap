name: Upstream Release Validation

on:
  repository_dispatch:
    types:
      - upstream_release
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name (without .rb)
        required: true
        default: ai-mr-comment
      version:
        description: Release tag (for example v0.8.0)
        required: true
      url:
        description: Source tarball URL for that tag
        required: true
      sha256:
        description: Source tarball SHA256
        required: true

jobs:
  validate-upstream-release:
    permissions:
      contents: read
    runs-on: macos-latest
    outputs:
      formula: ${{ steps.validate.outputs.formula }}
      version: ${{ steps.validate.outputs.version }}
      src_url: ${{ steps.validate.outputs.src_url }}
      src_sha256: ${{ steps.validate.outputs.src_sha256 }}
      formula_file: ${{ steps.validate.outputs.formula_file }}
      changed: ${{ steps.validate.outputs.changed }}
      commit: ${{ steps.validate.outputs.commit }}
      commit_full: ${{ steps.validate.outputs.commit_full }}
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_FROM_API: 1
      TAP_NAME: pbsladek/tap
      EVENT_NAME: ${{ github.event_name }}
      INPUT_FORMULA: ${{ github.event.inputs.formula }}
      INPUT_VERSION: ${{ github.event.inputs.version }}
      INPUT_URL: ${{ github.event.inputs.url }}
      INPUT_SHA256: ${{ github.event.inputs.sha256 }}
      PAYLOAD_FORMULA: ${{ github.event.client_payload.formula }}
      PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
      PAYLOAD_URL: ${{ github.event.client_payload.url }}
      PAYLOAD_SHA256: ${{ github.event.client_payload.sha256 }}
      PAYLOAD_COMMIT: ${{ github.event.client_payload.commit }}
      PAYLOAD_COMMIT_FULL: ${{ github.event.client_payload.commit_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate upstream release
        id: validate
        env:
          RUN_BREW_CHECKS: "true"
          APPLY_FORMULA_CHANGES: "false"
        run: .github/scripts/upstream-release-validation.rb

  open-formula-pr:
    needs: validate-upstream-release
    if: ${{ needs.validate-upstream-release.outputs.changed == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.HOMEBREW_TAP_PR_TOKEN != '' && secrets.HOMEBREW_TAP_PR_TOKEN || github.token }}

      - name: Open or update formula bump PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_TOKEN != '' && secrets.HOMEBREW_TAP_PR_TOKEN || secrets.GITHUB_TOKEN }}
          FORMULA: ${{ needs.validate-upstream-release.outputs.formula }}
          VERSION: ${{ needs.validate-upstream-release.outputs.version }}
          SRC_URL: ${{ needs.validate-upstream-release.outputs.src_url }}
          SRC_SHA256: ${{ needs.validate-upstream-release.outputs.src_sha256 }}
          FORMULA_FILE: ${{ needs.validate-upstream-release.outputs.formula_file }}
          COMMIT: ${{ needs.validate-upstream-release.outputs.commit }}
          COMMIT_FULL: ${{ needs.validate-upstream-release.outputs.commit_full }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          ASSIGNEE: pbsladek
        run: .github/scripts/open-upstream-release-pr.rb

  no-formula-change:
    needs: validate-upstream-release
    if: ${{ needs.validate-upstream-release.outputs.changed != 'true' }}
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - name: No formula change required
        run: echo "Formula already up to date; no PR created."
